<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distant Lights</title>
    <meta
      name="description"
      content="Compact physics-informed light-to-sound demo."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page app-shell">
      <main class="app-grid">
        <section class="panel dark top-panel">
          <div class="topbar compact-grid">
            <label class="field preset-field">
              <span>Preset</span>
              <select id="presetSelect"></select>
            </label>
            <div class="status compact-status" id="statusText">Ready</div>
          </div>

          <div class="button-row compact-buttons wrap">
            <button id="playBtn" class="primary">Play</button>
            <button id="stopBtn">Stop</button>
            <button id="exportWavBtn">WAV</button>
            <button id="recordBtn">Record</button>
            <button id="exportJsonBtn">Preset</button>
            <button id="saveBrowserBtn">Save</button>
            <label class="button like-button compact-file-btn">
              Import
              <input id="importPresetInput" type="file" accept="application/json,.json" hidden />
            </label>
          </div>

          <div class="preview-grid compact-preview-grid">
            <section class="preview-card">
              <div class="mini-title">Light</div>
              <canvas id="lightCanvas" width="640" height="150"></canvas>
            </section>
            <section class="preview-card">
              <div class="mini-title">Audio</div>
              <canvas id="audioCanvas" width="640" height="150"></canvas>
            </section>
          </div>

          <section class="compact-summary">
            <div class="summary-row">
              <div class="summary-item">
                <span class="summary-k">Model</span>
                <span class="summary-v" id="modelTitle"></span>
              </div>
              <div class="summary-item">
                <span class="summary-k">Interpretation</span>
                <span class="summary-v" id="literalStatus"></span>
              </div>
              <div class="summary-item wide">
                <span class="summary-k">Params</span>
                <span class="summary-v mono" id="numericSummary"></span>
              </div>
            </div>
            <div class="formula-row mono">
              <div id="formula1"></div>
              <div id="formula2"></div>
            </div>
            <div class="warning compact-warning" id="warningBox"></div>
          </section>
        </section>

        <aside class="panel light side-panel">
          <div class="section-head">
            <h2>Controls</h2>
            <div class="small-note" id="capabilityText">Ready</div>
          </div>
          <div id="controlsContainer" class="controls-grid compact-controls"></div>

          <section class="saved-inline">
            <div class="saved-head">Saved browser presets</div>
            <div class="saved-row">
              <select id="savedPresetSelect" class="grow"></select>
              <button id="loadBrowserBtn">Load</button>
              <button id="deleteBrowserBtn">Delete</button>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
